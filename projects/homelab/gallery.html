<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Homelab</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="img/cl-logo.svg">

    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #0b0f19;
    }

    h1 {
        position: absolute; top: 0; 
        margin: auto;
        color: #0ea5e9;
        font-size: 10vh;
    }
    
    .gallery {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20vh;
    }

    .gallery-photo {
        padding-top: 5vh;
    }

    p {
        padding-top: 1vh;
        color: #0ea5e9;
    }



    </style>
</head>
<body>
   <h1>Homelab Photo Gallery</h1>
   
   <div class="gallery">
    <img src="../../img/gallery/man-working-on-desktop-pc-in-office-HN72X1.jpg" alt=""  class="gallery-photo">
    <p>description</p>
    <img src="../../img/gallery/black-custom-gaming-pc-computer-with-glass-windows-and-colorful-bright-rgb-rainbow-led-lighting-isolated-on-white-background-2GWMBWM.jpg" alt="" class="gallery-photo">
    <img src="../../img/gallery/istockphoto-1435220822-612x612.jpg" alt="" class="gallery-photo">
   </div>
</body>
</html>
