<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;

    /* The outer blue background, acting as the full screen wrapper */
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: black;
    }



    .text-container {
        position: absolute; top: 0; left: 50;
        padding: 5vh;
        text-align: center;
    }

    h1 {
        font-size: 10vh;
        color: #0ea5e9;
    }

    p {
        font-size: small;
        color: #0ea5e9;
    }

    #network-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1; /* Keeps it behind your text and projects */
        background-color: #0b0f19; /* Sleek dark-mode background */
    } 
    </style>
</head>
